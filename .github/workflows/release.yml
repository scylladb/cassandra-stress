name: "Release"

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  tag:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - name: Get Tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: olegtarasov/get-tag@9a8716825750e73195b02db42777b92ffe960605 # v2.1.4
        id: version_tag
        with:
          tagRegex: "v(.*)"
  docker:
    needs: ['tag']
    uses: "./.github/workflows/docker.yml"
    with:
      version: '${{ needs.tag.outputs.version }}'
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      REGISTRY: ${{ secrets.REGISTRY }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  build:
    needs: ['tag']
    uses: "./.github/workflows/build.yml"
    strategy:
      matrix:
        java: [ '21' ]
    with:
      version: '${{ needs.tag.outputs.version }}'
      java: '${{ matrix.java }}'
  release:
    needs: ['tag', 'docker', 'build']
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cassandra-stress-java21
      - name: Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        id: release
        with:
          make_latest: true
          name: "v${{ needs.tag.outputs.version }}"
          tag_name: "v${{ needs.tag.outputs.version }}"
          generate_release_notes: true
          append_body: true
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            cassandra-stress-bin-java21.tar.gz
            cassandra-stress-bin-java21.tar.gz.sha256
            cassandra-stress-bin-java21.tar.gz.sha512
            cassandra-stress-src-java21.tar.gz
            cassandra-stress-src-java21.tar.gz.sha256
            cassandra-stress-src-java21.tar.gz.sha512
            cassandra-stress-java21_${{ needs.tag.outputs.version }}_all.deb
            cassandra-stress-java21-${{ needs.tag.outputs.version }}-1.noarch.rpm
      - name: "Build Changelog"
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@c9bcd8238b6f41e05561348339429d360b1c0247 # v6.2.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          configuration: ".github/changelog-config.json"
          outputFile: CHANGELOG.md
          ignorePreReleases: false
      - name: "Commit Changelog"
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: "docs: update CHANGELOG.md for v${{ needs.tag.outputs.version }}"
          branch: ${{ github.event.repository.default_branch }}
          commit_options: '--no-verify --signoff'
          file_pattern: CHANGELOG.md

  sign-packages:
    needs: ['tag', 'release']
    runs-on: ubuntu-24.04
    steps:
      - name: Trigger Jenkins sign-cassandra-stress pipeline
        run: |
          curl -sf -X POST \
            "https://jenkins.scylladb.com/job/releng/job/sign-cassandra-stress/buildWithParameters" \
            --user "${{ secrets.JENKINS_USERNAME }}:${{ secrets.JENKINS_TOKEN }}" \
            --data-urlencode "CASSANDRA_STRESS_VERSION=${{ needs.tag.outputs.version }}" \
            --data-urlencode "GITHUB_RELEASE_TAG=v${{ needs.tag.outputs.version }}" \
            --data-urlencode "UPLOAD_TO_RELEASE=true" \
            --data-urlencode "UPLOAD_TO_S3=true"
